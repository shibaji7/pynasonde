site_name: Pynasonde Documentation
repo_url: https://github.com/shibaji7/pynasonde
theme: 
  name: "material"
  logo: assets/Colab-pynasonde-logo2.jpg
  features:
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.path

plugins:
    - search
    - glightbox
    - awesome-pages
    - mkdocstrings:
        enabled: !ENV [ENABLE_MKDOCSTRINGS, true]
        default_handler: python
        handlers:
          python:
            paths: [".."]
            options:
              show_root_heading: true
              show_source: true
              members_order: source
              show_symbol_type_heading: true
              show_symbol_type_toc: true
     
markdown_extensions:
    - extra
    - admonition
    - toc
    - tables
    - attr_list
    - toc:
        permalink: true
    - pymdownx.arithmatex:
        generic: true
    - pymdownx.betterem
    - pymdownx.caret
    - pymdownx.mark
    - pymdownx.tilde
    - attr_list
    - md_in_html
    - pymdownx.highlight:
        anchor_linenums: true
        line_spans: __span
        pygments_lang_class: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.superfences
    - pymdownx.highlight
    - pymdownx.details
    - footnotes
        
extra_css:
    - css/pynasonde.css

extra_javascript:
    - javascripts/mathjax.js
    - https://polyfill.io/v3/polyfill.min.js?features=es6
    - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

